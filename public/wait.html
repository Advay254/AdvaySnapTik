<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preparing Download – AdvaySnapTik</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<!-- AD_POPUNDER_URL goes here as a <script src="..."> tag -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-family:'Sora',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:32px;letter-spacing:-.5px}
.logo .t{color:#25f4ee}.logo .r{color:#fe2c55}
.icon{font-size:3.5rem;margin-bottom:20px}
h1{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:8px}
p{color:rgba(240,240,240,.5);font-size:.9rem;margin-bottom:24px;max-width:300px}
.bar{width:240px;height:4px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;margin-bottom:10px}
.fill{height:100%;background:linear-gradient(90deg,#25f4ee,#fe2c55);border-radius:999px;width:0%;animation:prog 5s ease-in-out forwards}
@keyframes prog{to{width:100%}}
.count{font-family:'Sora',sans-serif;font-size:2.5rem;font-weight:800;color:#25f4ee}
.clbl{font-size:.78rem;color:rgba(240,240,240,.3);margin-bottom:28px}
.adslot{width:300px;height:250px;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.08);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:rgba(255,255,255,.15);margin-bottom:24px}
.back{font-size:.8rem;color:rgba(240,240,240,.3)}
.back a{color:rgba(37,244,238,.7)}.back a:hover{color:#25f4ee}
</style>
</head>
<body>
<div class="logo">Advay<span class="t">Snap</span><span class="r">Tik</span></div>
<div class="icon">⬇️</div>
<h1>Preparing Your Download</h1>
<p>Your file is being fetched. This only takes a moment.</p>
<div class="bar"><div class="fill"></div></div>
<div class="count" id="c">5</div>
<div class="clbl">seconds remaining</div>
<!-- Replace .adslot div with your actual 300x250 ad tag (AD_BANNER_URL) -->
<div class="adslot">Advertisement 300×250</div>
<div class="back"><a href="/" onclick="window.close();return false;">← Back to AdvaySnapTik</a></div>
<script>
let t=5,el=document.getElementById('c');
const iv=setInterval(()=>{t--;el.textContent=t;if(t<=0){clearInterval(iv);el.textContent='✓';setTimeout(()=>window.close(),600);}},1000);
</script>
</body>
</html>
