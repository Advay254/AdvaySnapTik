<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline – AdvaySnapTik</title><meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:24px}
.logo{font-family:'Sora',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:32px}
.logo .t{color:#25f4ee}.logo .r{color:#fe2c55}
.icon{font-size:3.5rem;margin-bottom:20px}
h1{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:10px}
p{color:rgba(240,240,240,.5);font-size:.9rem;max-width:320px;margin-bottom:28px}
.btn{padding:12px 28px;background:linear-gradient(135deg,#25f4ee,#0ec8c3);border:none;border-radius:10px;color:#0d0d0d;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s ease}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,244,238,.25)}
</style>
</head>
<body>
<div class="logo">Advay<span class="t">Snap</span><span class="r">Tik</span></div>
<div class="icon">📡</div>
<h1>You're Offline</h1>
<p>AdvaySnapTik needs an internet connection to fetch TikTok download links. Check your connection and try again.</p>
<button class="btn" onclick="location.reload()">Try Again</button>
</body>
</html>
